# Render Blueprint: Meta Ads MCP Server
# https://render.com/docs/blueprint-spec
services:
  - type: web
    name: metaadsmcpserver
    runtime: node
    region: oregon

    buildCommand: npm install && npm run build
    startCommand: npm start

    envVars:
      - key: NODE_ENV
        value: production
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
